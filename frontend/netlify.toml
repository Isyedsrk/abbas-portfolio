# Netlify Drop: this file is NOT used when you drag-and-drop the `dist` folder.
# 1) cd frontend && npm install && npm run build:drop
# 2) Drag the `frontend/dist` folder onto https://app.netlify.com/drop
#    (SPA routing uses public/_redirects copied into dist.)
#
# Git-connected Netlify: build settings below apply; [build.environment] sets VITE_API_URL.

[build]
  # Directory to publish to deploy
  publish = "dist"
  # Command to build the site
  command = "npm run build"

# Vite injects this at build time (see src/utils/api.js). Override in Netlify UI if the API URL changes.
[build.environment]
  VITE_API_URL = "https://abbas-portfolio-1sj5.onrender.com"

# Handle React Router paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200 